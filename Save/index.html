<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Zone Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .time-section {
            margin-bottom: 30px;
        }

        .time-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .time-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        .date-display {
            font-size: 1.1em;
            color: #888;
            text-align: center;
            margin-bottom: 20px;
        }

        .timezone-selector {
            width: 100%;
            padding: 15px;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .timezone-selector:hover {
            border-color: #667eea;
        }

        .timezone-selector:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .info-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-weight: 600;
        }

        .refresh-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .json-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .json-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .json-display {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        /* JSON Syntax Highlighting Colors */
        .json-key {
            color: #9cdcfe;
        }

        .json-string {
            color: #ce9178;
        }

        .json-number {
            color: #b5cea8;
        }

        .json-boolean {
            color: #569cd6;
        }

        .json-null {
            color: #569cd6;
            font-style: italic;
        }

        .json-bracket {
            color: #ffd700;
            font-weight: bold;
        }

        .json-colon {
            color: #d4d4d4;
        }

        .json-comma {
            color: #d4d4d4;
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .copy-btn.copied {
            background: #17a2b8;
        }

        @media (max-width: 600px) {
            .time-display {
                font-size: 2em;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 Time Zone Converter</h1>
        
        <div class="time-section">
            <div class="time-label">Current Time (Local)</div>
            <div class="time-display" id="localTime">--:--:--</div>
            <div class="date-display" id="localDate">--</div>
        </div>

        <div class="time-section">
            <label for="timezoneSelect" class="time-label">Select Time Zone</label>
            <select id="timezoneSelect" class="timezone-selector">
                <!-- Options will be populated dynamically with UTC offset -->
            </select>
        </div>

        <div class="time-section">
            <div class="time-label">Converted Time</div>
            <div class="time-display" id="convertedTime">--:--:--</div>
            <div class="date-display" id="convertedDate">--</div>
        </div>

        <div class="info-section">
            <div class="info-item">
                <span class="info-label">Time Zone:</span>
                <span class="info-value" id="timezoneName">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">UTC Offset:</span>
                <span class="info-value" id="utcOffset">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">Time Difference:</span>
                <span class="info-value" id="timeDifference">--</span>
            </div>
        </div>

        <button class="refresh-btn" onclick="updateTime()">🔄 Refresh Time</button>

        <div class="json-section">
            <div class="json-label">📋 JSON Data (for saving)</div>
            <div class="json-display" id="jsonDisplay">{}</div>
            <button class="copy-btn" onclick="copyJson()">📋 Copy JSON</button>
        </div>
    </div>

    <script>
        let updateInterval;

        // Get all timezone options
        const timezones = [
            { value: 'local', name: 'Local Time' },
            { value: 'UTC', name: 'UTC (Coordinated Universal Time)' },
            { value: 'America/New_York', name: 'Eastern Time (ET)' },
            { value: 'America/Chicago', name: 'Central Time (CT)' },
            { value: 'America/Denver', name: 'Mountain Time (MT)' },
            { value: 'America/Los_Angeles', name: 'Pacific Time (PT)' },
            { value: 'Europe/London', name: 'London (GMT)' },
            { value: 'Europe/Paris', name: 'Paris (CET)' },
            { value: 'Europe/Berlin', name: 'Berlin (CET)' },
            { value: 'Asia/Tokyo', name: 'Tokyo (JST)' },
            { value: 'Asia/Shanghai', name: 'Shanghai (CST)' },
            { value: 'Asia/Hong_Kong', name: 'Hong Kong (HKT)' },
            { value: 'Asia/Bangkok', name: 'Bangkok (ICT)' },
            { value: 'Asia/Singapore', name: 'Singapore (SGT)' },
            { value: 'Asia/Dubai', name: 'Dubai (GST)' },
            { value: 'Australia/Sydney', name: 'Sydney (AEDT)' },
            { value: 'Pacific/Auckland', name: 'Auckland (NZDT)' }
        ];

        // Function to get UTC offset for a timezone
        function getUTCOffset(timezone) {
            if (timezone === 'local') {
                const offset = -new Date().getTimezoneOffset();
                const hours = Math.floor(Math.abs(offset) / 60);
                const minutes = Math.abs(offset) % 60;
                const sign = offset >= 0 ? '+' : '-';
                return `${sign}${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            }

            if (timezone === 'UTC') {
                return '+00:00';
            }

            try {
                const now = new Date();
                const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
                const tzDate = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
                const offsetMinutes = (tzDate - utcDate) / 60000;
                const hours = Math.floor(Math.abs(offsetMinutes) / 60);
                const minutes = Math.abs(offsetMinutes) % 60;
                const sign = offsetMinutes >= 0 ? '+' : '-';
                return `${sign}${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            } catch (e) {
                return '';
            }
        }

        // Populate timezone select with UTC offset
        function populateTimezoneSelect() {
            const select = document.getElementById('timezoneSelect');
            select.innerHTML = '';

            timezones.forEach(tz => {
                const option = document.createElement('option');
                option.value = tz.value;
                
                if (tz.value === 'local') {
                    const offset = getUTCOffset('local');
                    option.textContent = `${tz.name} (UTC${offset})`;
                } else if (tz.value === 'UTC') {
                    option.textContent = `${tz.name} (UTC+00:00)`;
                } else {
                    const offset = getUTCOffset(tz.value);
                    option.textContent = `${tz.name} (UTC${offset})`;
                }
                
                select.appendChild(option);
            });
        }

        function formatTime(date) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        function formatDate(date) {
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            return date.toLocaleDateString('en-US', options);
        }

        function getTimeInTimezone(timezone) {
            if (timezone === 'local') {
                return new Date();
            }
            
            if (timezone === 'UTC') {
                return new Date(new Date().toUTCString());
            }

            try {
                const now = new Date();
                const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
                const targetTime = new Date(utcTime);
                
                // Use Intl.DateTimeFormat for timezone conversion
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: timezone,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });

                const parts = formatter.formatToParts(now);
                const year = parseInt(parts.find(p => p.type === 'year').value);
                const month = parseInt(parts.find(p => p.type === 'month').value) - 1;
                const day = parseInt(parts.find(p => p.type === 'day').value);
                const hour = parseInt(parts.find(p => p.type === 'hour').value);
                const minute = parseInt(parts.find(p => p.type === 'minute').value);
                const second = parseInt(parts.find(p => p.type === 'second').value);

                return new Date(year, month, day, hour, minute, second);
            } catch (e) {
                console.error('Error converting timezone:', e);
                return new Date();
            }
        }

        function getTimezoneInfo(timezone) {
            if (timezone === 'local') {
                const offset = -new Date().getTimezoneOffset();
                const hours = Math.floor(Math.abs(offset) / 60);
                const minutes = Math.abs(offset) % 60;
                const sign = offset >= 0 ? '+' : '-';
                return {
                    name: 'Local Time',
                    offset: `${sign}${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`,
                    offsetMinutes: offset
                };
            }

            try {
                const now = new Date();
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: timezone,
                    timeZoneName: 'long'
                });
                
                const parts = formatter.formatToParts(now);
                const timeZoneName = parts.find(p => p.type === 'timeZoneName')?.value || timezone;

                // Calculate UTC offset
                const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
                const tzDate = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
                const offsetMinutes = (tzDate - utcDate) / 60000;
                const hours = Math.floor(Math.abs(offsetMinutes) / 60);
                const minutes = Math.abs(offsetMinutes) % 60;
                const sign = offsetMinutes >= 0 ? '+' : '-';

                return {
                    name: timeZoneName,
                    offset: `UTC${sign}${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`,
                    offsetMinutes: offsetMinutes
                };
            } catch (e) {
                return {
                    name: timezone,
                    offset: 'Unknown',
                    offsetMinutes: 0
                };
            }
        }

        function calculateTimeDifference(localOffset, targetOffset) {
            const diffMinutes = targetOffset - localOffset;
            const hours = Math.floor(Math.abs(diffMinutes) / 60);
            const minutes = Math.abs(diffMinutes) % 60;
            const sign = diffMinutes >= 0 ? '+' : '-';
            
            if (diffMinutes === 0) {
                return 'Same time';
            }
            
            return `${sign}${hours}h ${minutes}m`;
        }

        function generateJsonData() {
            const now = new Date();
            const timezoneSelect = document.getElementById('timezoneSelect');
            const selectedTimezone = timezoneSelect.value;
            const convertedDate = getTimeInTimezone(selectedTimezone);
            const localInfo = getTimezoneInfo('local');
            const targetInfo = getTimezoneInfo(selectedTimezone);
            const timeDiff = calculateTimeDifference(localInfo.offsetMinutes, targetInfo.offsetMinutes);

            const jsonData = {
                timestamp: now.toISOString(),
                localTime: {
                    time: formatTime(now),
                    date: formatDate(now),
                    timezone: localInfo.name,
                    utcOffset: localInfo.offset,
                    isoString: now.toISOString(),
                    unixTimestamp: Math.floor(now.getTime() / 1000)
                },
                convertedTime: {
                    time: formatTime(convertedDate),
                    date: formatDate(convertedDate),
                    timezone: targetInfo.name,
                    timezoneValue: selectedTimezone,
                    utcOffset: targetInfo.offset,
                    isoString: convertedDate.toISOString(),
                    unixTimestamp: Math.floor(convertedDate.getTime() / 1000)
                },
                timeDifference: {
                    difference: timeDiff,
                    offsetMinutes: targetInfo.offsetMinutes - localInfo.offsetMinutes
                },
                metadata: {
                    savedAt: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                }
            };

            return jsonData;
        }

        function syntaxHighlight(json) {
            if (typeof json !== 'string') {
                json = JSON.stringify(json, null, 2);
            }
            
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            })
            .replace(/([{}])/g, '<span class="json-bracket">$1</span>')
            .replace(/(\[|\])/g, '<span class="json-bracket">$1</span>')
            .replace(/(:)/g, '<span class="json-colon">$1</span>')
            .replace(/(,)/g, '<span class="json-comma">$1</span>');
        }

        function updateJsonDisplay() {
            const jsonData = generateJsonData();
            const jsonString = JSON.stringify(jsonData, null, 2);
            const highlightedJson = syntaxHighlight(jsonString);
            document.getElementById('jsonDisplay').innerHTML = highlightedJson;
        }

        function getPlainJsonString() {
            const jsonData = generateJsonData();
            return JSON.stringify(jsonData, null, 2);
        }

        function copyJson() {
            const jsonString = getPlainJsonString();
            navigator.clipboard.writeText(jsonString).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ Copied!';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy JSON. Please select and copy manually.');
            });
        }

        function updateTime() {
            const now = new Date();
            const timezoneSelect = document.getElementById('timezoneSelect');
            const selectedTimezone = timezoneSelect.value;

            // Update local time
            document.getElementById('localTime').textContent = formatTime(now);
            document.getElementById('localDate').textContent = formatDate(now);

            // Update converted time
            const convertedDate = getTimeInTimezone(selectedTimezone);
            document.getElementById('convertedTime').textContent = formatTime(convertedDate);
            document.getElementById('convertedDate').textContent = formatDate(convertedDate);

            // Update timezone info
            const localInfo = getTimezoneInfo('local');
            const targetInfo = getTimezoneInfo(selectedTimezone);
            
            document.getElementById('timezoneName').textContent = targetInfo.name;
            document.getElementById('utcOffset').textContent = targetInfo.offset;
            
            const timeDiff = calculateTimeDifference(localInfo.offsetMinutes, targetInfo.offsetMinutes);
            document.getElementById('timeDifference').textContent = timeDiff;

            // Update JSON display
            updateJsonDisplay();
        }

        // Initialize
        populateTimezoneSelect();
        updateTime();
        
        // Update every second
        updateInterval = setInterval(updateTime, 1000);

        // Update when timezone changes
        document.getElementById('timezoneSelect').addEventListener('change', updateTime);

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });
    </script>
</body>
</html>
