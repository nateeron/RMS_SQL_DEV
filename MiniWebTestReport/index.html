<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Settings CRUD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Settings Management</h1>
            <nav>
                <a href="index.html" class="nav-link active">Settings</a>
                <a href="actions.html" class="nav-link">Actions</a>
            </nav>
        </header>

        <div class="toolbar">
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="btn btn-primary" onclick="openAddModal()">+ Add Setting</button>
                <button class="btn btn-primary" onclick="openBaseUrlModal()">+ Add Base URL</button>
            </div>
        </div>

        <!-- Base URLs Section -->
        <div class="table-container">
            <h2 style="color: #4ec9b0; margin-bottom: 15px; font-size: 18px;">Base URLs</h2>
            <table id="baseUrlsTable" style="margin-bottom: 30px;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>URL</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="baseUrlsBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>

        <!-- Settings Section -->
        <div class="table-container">
            <h2 style="color: #4ec9b0; margin-bottom: 15px; font-size: 18px;">Settings</h2>
            <table id="settingsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Path</th>
                        <th>Method</th>
                        <th>Response</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="settingsBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Setting Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Setting</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="settingForm">
                    <input type="hidden" id="editId" value="">
                    <div class="form-group">
                        <label for="path">Path:</label>
                        <input type="text" id="path" required placeholder="/api/endpoint">
                    </div>
                    <div class="form-group">
                        <label for="method">Method:</label>
                        <select id="method" required onchange="toggleRequestField()">
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                        </select>
                    </div>
                    <div class="form-group" id="reqGroup" style="display: none;">
                        <label for="req">Request Body (JSON) - for POST:</label>
                        <textarea id="req" rows="6" placeholder='{"key": "value"}'></textarea>
                    </div>
                    <div class="form-group">
                        <label for="resp">Response (JSON):</label>
                        <textarea id="resp" rows="6" placeholder='{"key": "value"}'></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Add/Edit Base URL Modal -->
    <div id="baseUrlModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="baseUrlModalTitle">Add Base URL</h2>
                <span class="close" onclick="closeBaseUrlModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="baseUrlForm">
                    <input type="hidden" id="baseUrlEditId" value="">
                    <div class="form-group">
                        <label for="baseUrlName">Name:</label>
                        <input type="text" id="baseUrlName" required placeholder="Production / Development">
                    </div>
                    <div class="form-group">
                        <label for="baseUrlUrl">URL:</label>
                        <input type="text" id="baseUrlUrl" required placeholder="https://api.example.com">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeBaseUrlModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
